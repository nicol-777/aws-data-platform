name: Deploy Lambda Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy validation Lambda
        run: |
          zip -j validation.zip lambda/data_validation.py
          aws lambda update-function-code \
            --function-name data-validation-function \
            --zip-file fileb://validation.zip

      - name: Deploy API Lambda
        run: |
          zip -j api.zip lambda/trusted_data_api.py
          aws lambda update-function-code \
            --function-name trusted-data-api \
            --zip-file fileb://api.zip